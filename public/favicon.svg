<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Bar chart icon (white) -->
  <!-- Bar 1 - left, medium height -->
  <rect x="10" y="30" width="11" height="22" rx="3" fill="white"/>
  <!-- Bar 2 - center, tallest -->
  <rect x="26" y="18" width="11" height="34" rx="3" fill="white"/>
  <!-- Bar 3 - right, shortest -->
  <rect x="42" y="38" width="11" height="14" rx="3" fill="white"/>
</svg>
